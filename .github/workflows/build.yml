name: Build RustBridge Plugin

on:
  push:
    branches: [ master ]
    tags: [ '*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Build Rust cdylib
        working-directory: rust
        run: |
          cargo clean
          cargo build --release

      - name: Build C# plugin
        working-directory: csharp
        run: |
          dotnet clean
          dotnet build -c Release

      - name: Prepare Rust artifact
        run: |
          mkdir -p artifacts/rust
          cp rust/target/release/libmslx_plugin_rust.so artifacts/rust/

      - name: Prepare Dotnet artifact
        run: |
          mkdir -p artifacts/dotnet
          cp csharp/bin/Release/net10.0/MSLX.Plugin.RustBridge.dll artifacts/dotnet/

      - name: Upload Rust artifact
        uses: actions/upload-artifact@v7
        with:
          name: rust-cdylib
          path: artifacts/rust/libmslx_plugin_rust.so

      - name: Upload Dotnet artifact
        uses: actions/upload-artifact@v7
        with:
          name: dotnet-plugin
          path: artifacts/dotnet/MSLX.Plugin.RustBridge.dll

  release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Rust artifact
        uses: actions/download-artifact@v4
        with:
          name: rust-cdylib
          path: release_artifacts

      - name: Download Dotnet artifact
        uses: actions/download-artifact@v7
        with:
          name: dotnet-plugin
          path: release_artifacts

      - name: Publish Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            release_artifacts/libmslx_plugin_rust.so
            release_artifacts/MSLX.Plugin.RustBridge.dll
