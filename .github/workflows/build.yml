name: Build and Release RustBridge

on:
  push:
    branches: [ master, main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

permissions:
  contents: read

env:
  CONFIGURATION: Release
  DOTNET_VERSION: 10.0.x
  CARGO_TERM_COLOR: always

jobs:
  package-linux:
    name: Package Linux demo and NuGet
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Restore .NET projects
        run: dotnet restore mslx-plugin-rustbridge.sln

      - name: Pack RustBridge library
        run: dotnet pack csharp/MSLX.Plugin.RustBridge.csproj -c "$CONFIGURATION" --no-restore

      - name: Build demo plugin
        run: dotnet build samples/RustBridgeDemo/MSLX.Plugin.RustBridge.Demo.csproj -c "$CONFIGURATION" --no-restore

      - name: Verify Linux outputs
        run: |
          set -euo pipefail
          shopt -s nullglob
          nupkgs=(csharp/bin/$CONFIGURATION/*.nupkg)
          test "${#nupkgs[@]}" -gt 0
          test -f samples/RustBridgeDemo/bin/$CONFIGURATION/net10.0/MSLX.Plugin.RustBridge.Demo.dll
          grep -a -q "RustBridge.Native.linux-x64.libmslx_plugin_rustbridge.so" \
            samples/RustBridgeDemo/bin/$CONFIGURATION/net10.0/MSLX.Plugin.RustBridge.Demo.dll

      - name: Package Linux artifacts
        run: |
          set -euo pipefail
          mkdir -p artifacts/nuget artifacts/demo-linux
          cp csharp/bin/$CONFIGURATION/*.nupkg artifacts/nuget/
          cp samples/RustBridgeDemo/bin/$CONFIGURATION/net10.0/MSLX.Plugin.RustBridge.Demo.dll artifacts/demo-linux/
          tar -C artifacts/demo-linux -czf artifacts/rustbridge-demo-linux.tar.gz .

      - name: Upload NuGet package
        uses: actions/upload-artifact@v7
        with:
          name: rustbridge-nuget
          path: artifacts/nuget/*.nupkg
          if-no-files-found: error
          retention-days: 14

      - name: Upload Linux demo package
        uses: actions/upload-artifact@v7
        with:
          name: rustbridge-demo-linux
          path: artifacts/rustbridge-demo-linux.tar.gz
          if-no-files-found: error
          retention-days: 14

  package-windows:
    name: Package Windows demo
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Restore .NET projects
        run: dotnet restore mslx-plugin-rustbridge.sln

      - name: Build demo plugin
        run: dotnet build samples/RustBridgeDemo/MSLX.Plugin.RustBridge.Demo.csproj -c $env:CONFIGURATION --no-restore
        shell: pwsh

      - name: Package Windows artifacts
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $outDir = "samples\RustBridgeDemo\bin\$env:CONFIGURATION\net10.0"
          $managedDll = Join-Path $outDir 'MSLX.Plugin.RustBridge.Demo.dll'

          if (-not (Test-Path $managedDll)) {
            throw "Missing managed plugin DLL: $managedDll"
          }
          $managedBytes = [System.IO.File]::ReadAllBytes($managedDll)
          $managedText = [System.Text.Encoding]::UTF8.GetString($managedBytes)
          if (-not $managedText.Contains('RustBridge.Native.win-x64.mslx_plugin_rustbridge.dll')) {
            throw "Managed plugin DLL does not contain the embedded Windows native library."
          }

          New-Item -ItemType Directory -Path artifacts\demo-windows -Force | Out-Null
          Copy-Item $managedDll artifacts\demo-windows\
          Compress-Archive -Path artifacts\demo-windows\* -DestinationPath artifacts\rustbridge-demo-windows.zip -Force

      - name: Upload Windows demo package
        uses: actions/upload-artifact@v7
        with:
          name: rustbridge-demo-windows
          path: artifacts/rustbridge-demo-windows.zip
          if-no-files-found: error
          retention-days: 14

  package-macos:
    name: Package macOS demo
    runs-on: macos-15-intel

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Restore .NET projects
        run: dotnet restore mslx-plugin-rustbridge.sln

      - name: Build demo plugin
        run: dotnet build samples/RustBridgeDemo/MSLX.Plugin.RustBridge.Demo.csproj -c "$CONFIGURATION" --no-restore

      - name: Verify macOS outputs
        run: |
          set -euo pipefail
          test -f samples/RustBridgeDemo/bin/$CONFIGURATION/net10.0/MSLX.Plugin.RustBridge.Demo.dll
          grep -a -q "RustBridge.Native.osx-x64.libmslx_plugin_rustbridge.dylib" \
            samples/RustBridgeDemo/bin/$CONFIGURATION/net10.0/MSLX.Plugin.RustBridge.Demo.dll

      - name: Package macOS artifacts
        run: |
          set -euo pipefail
          mkdir -p artifacts/demo-macos
          cp samples/RustBridgeDemo/bin/$CONFIGURATION/net10.0/MSLX.Plugin.RustBridge.Demo.dll artifacts/demo-macos/
          tar -C artifacts/demo-macos -czf artifacts/rustbridge-demo-macos.tar.gz .

      - name: Upload macOS demo package
        uses: actions/upload-artifact@v7
        with:
          name: rustbridge-demo-macos
          path: artifacts/rustbridge-demo-macos.tar.gz
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    needs: [ package-linux, package-windows, package-macos ]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          path: release_artifacts

      - name: List release artifacts
        run: find release_artifacts -maxdepth 3 -type f -print | sort

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish NuGet package
        run: |
          dotnet nuget push "release_artifacts/rustbridge-nuget/*.nupkg" \
            --api-key "${{ secrets.NUGET_API_KEY }}" \
            --source "https://api.nuget.org/v3/index.json" \
            --skip-duplicate

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release_artifacts/rustbridge-nuget/*.nupkg
            release_artifacts/rustbridge-demo-linux/rustbridge-demo-linux.tar.gz
            release_artifacts/rustbridge-demo-macos/rustbridge-demo-macos.tar.gz
            release_artifacts/rustbridge-demo-windows/rustbridge-demo-windows.zip
